<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blink Market</title>

<style>
:root{
--red:#e53935;
--blue:#1e88e5;
--gold:#d4af37;
--white:#ffffff;
--bg:#f4f6f9;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

/* HEADER */
header{
background:var(--blue);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

/* HERO */
.hero{
background:linear-gradient(45deg,var(--gold),#ffe082);
text-align:center;
padding:20px;
}

/* GRID */
.container{padding:15px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}
.card:hover{transform:translateY(-5px);}

/* BUTTON */
.btn{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{background:var(--red);color:white;width:100%;}
.plus{background:var(--blue);color:white;}
.minus{background:var(--gold);}

/* QTY */
.qty{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-top:8px;
}

/* CART */
.cart-item{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

/* FORM */
form{
background:white;
padding:15px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:6px 0;
}

.checkout-btn{
background:var(--blue);
color:white;
width:100%;
padding:10px;
}

</style>
</head>

<body>

<header>
<h2>Blink Market</h2>
<nav>
<a href="#home">Home</a>
<a href="#cart">Cart (<span id="count">0</span>)</a>
</nav>
</header>

<div id="app"></div>

<script>

/* PRODUCTS */
const PRODUCTS=[
{
id:1,
name:"Green Tea",
price:199,
desc:"Healthy organic green tea",
img:"https://via.placeholder.com/200"
},
{
id:2,
name:"Honey",
price:299,
desc:"Pure natural honey",
img:"https://via.placeholder.com/200"
},
{
id:3,
name:"Almonds",
price:499,
desc:"Premium quality almonds",
img:"https://via.placeholder.com/200"
}
];

/* CART */
let cart=JSON.parse(localStorage.getItem("neo_cart"))||[];

function save(){
localStorage.setItem("neo_cart",JSON.stringify(cart));
updateCount();
}

function updateCount(){
document.getElementById("count").innerText=
cart.reduce((a,c)=>a+c.qty,0);
}

function getQty(id){
let item=cart.find(i=>i.id===id);
return item?item.qty:0;
}

function changeQty(id,val){
let item=cart.find(i=>i.id===id);

if(item){
item.qty+=val;
if(item.qty<=0) cart=cart.filter(i=>i.id!==id);
}else{
cart.push({id,qty:1});
}

save();
render();
}

/* HOME */
function home(){
let html=`
<div class="hero">
<h1>Blink Market</h1>
<p>Fast Delivery ⚡</p>
</div>

<div class="container">
<div class="grid">`;

PRODUCTS.forEach(p=>{
let q=getQty(p.id);

html+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}" width="100%">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

${q>0?`
<div class="qty" onclick="event.stopPropagation()">
<button class="btn minus" onclick="changeQty(${p.id},-1)">-</button>
<span>${q}</span>
<button class="btn plus" onclick="changeQty(${p.id},1)">+</button>
</div>
`:
`<button class="btn add" onclick="event.stopPropagation();changeQty(${p.id},1)">
Add to Cart
</button>`}

</div>`;
});

html+=`</div></div>`;
app.innerHTML=html;
}

/* PRODUCT PAGE */
function openProduct(id){
location.hash="#product="+id;
}

function productPage(id){
let p=PRODUCTS.find(x=>x.id==id);
let q=getQty(p.id);

app.innerHTML=`
<div class="container">
<h2>${p.name}</h2>
<img src="${p.img}" width="100%">
<p>${p.desc}</p>
<h3>₹${p.price}</h3>

${q>0?`
<div class="qty">
<button class="btn minus" onclick="changeQty(${p.id},-1)">-</button>
<span>${q}</span>
<button class="btn plus" onclick="changeQty(${p.id},1)">+</button>
</div>
`:
`<button class="btn add" onclick="changeQty(${p.id},1)">Add to Cart</button>`}

</div>`;
}

/* CART */
function cartPage(){
let total=0;
let html=`<div class="container"><h2>Your Cart</h2>`;

if(cart.length===0){
html+="<p>Cart is empty</p>";
}else{
cart.forEach(c=>{
let p=PRODUCTS.find(x=>x.id===c.id);
total+=p.price*c.qty;

html+=`
<div class="cart-item">
<h3>${p.name}</h3>

<div class="qty">
<button class="btn minus" onclick="changeQty(${p.id},-1)">-</button>
<span>${c.qty}</span>
<button class="btn plus" onclick="changeQty(${p.id},1)">+</button>
</div>

<p>₹${p.price*c.qty}</p>
</div>`;
});

html+=`
<h2>Total ₹${total}</h2>
<button class="checkout-btn" onclick="location.hash='#checkout'">
Proceed to Checkout
</button>`;
}

html+="</div>";
app.innerHTML=html;
}

/* CHECKOUT */
function checkoutPage(){
let total=cart.reduce((s,c)=>{
let p=PRODUCTS.find(x=>x.id===c.id);
return s+p.price*c.qty;
},0);

app.innerHTML=`
<div class="container">
<h2>Checkout</h2>

<form id="form">
<input placeholder="Name" required>
<input placeholder="Email" required>
<input placeholder="Phone" required>
<textarea placeholder="Address" required></textarea>

<h3>Total ₹${total}</h3>
<button class="checkout-btn">Place Order</button>
</form>
</div>
`;

document.getElementById("form").onsubmit=(e)=>{
e.preventDefault();
alert("Order placed successfully!");
cart=[];
save();
location.hash="#home";
};
}

/* ROUTER */
function router(){
let hash=location.hash||"#home";

if(hash.startsWith("#product")){
productPage(hash.split("=")[1]);
}
else if(hash=="#cart") cartPage();
else if(hash=="#checkout") checkoutPage();
else home();
}

/* INIT */
function render(){
updateCount();
router();
}

window.addEventListener("hashchange",render);
render();

</script>

</body>
</html>
