
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blink Market</title>

<style>
:root {
    --red:#e53935;
    --blue:#1e88e5;
    --gold:#d4af37;
    --bg:#f4f6f8;
}

body { margin:0; font-family:Arial; background:var(--bg); }

header {
    background:var(--blue);
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

nav a { color:white; margin:0 10px; text-decoration:none; }

.cart-count {
    background:var(--gold);
    padding:3px 8px;
    border-radius:50%;
}

.container { padding:15px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.card {
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover { transform:translateY(-5px); }

.hero {
    background:var(--gold);
    padding:20px;
    text-align:center;
}

/* QTY CONTROL */
.qty {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:8px;
}

.qty button {
    width:30px;
    height:30px;
    border-radius:6px;
    font-size:16px;
}

.minus { background:var(--gold); }
.plus { background:var(--blue); color:white; }

.qty span {
    min-width:25px;
    text-align:center;
    font-weight:bold;
}

/* BUTTON */
.add-btn {
    width:100%;
    margin-top:8px;
    background:var(--red);
    color:white;
    padding:8px;
    border-radius:6px;
}

</style>
</head>

<body>

<header>
<h2>Blink Market</h2>
<nav>
<a href="#home">Home</a>
<a href="#cart">Cart (<span id="count">0</span>)</a>
</nav>
</header>

<div id="app"></div>

<script>
const PRODUCTS = [
{ id:1,name:"Green Tea",price:199,images:["https://via.placeholder.com/200"]},
{ id:2,name:"Honey",price:299,images:["https://via.placeholder.com/200"]},
{ id:3,name:"Almonds",price:499,images:["https://via.placeholder.com/200"]}
];

let cart = JSON.parse(localStorage.getItem("neo_cart"))||[];

function save(){
    localStorage.setItem("neo_cart",JSON.stringify(cart));
    updateCount();
}

function updateCount(){
    count.innerText = cart.reduce((a,c)=>a+c.qty,0);
}

function qty(id){
    let i = cart.find(x=>x.id===id);
    return i?i.qty:0;
}

function change(id,val){
    let i = cart.find(x=>x.id===id);

    if(i){
        i.qty += val;
        if(i.qty<=0) cart = cart.filter(x=>x.id!==id);
    } else {
        cart.push({id,qty:1});
    }

    save();
    render();
}

/* HOME */
function home(){
let html=`
<div class="hero">
<h1>Blink Market</h1>
<p>Fast & Fresh Deals</p>
</div>

<div class="container"><div class="grid">`;

PRODUCTS.forEach(p=>{
let q=qty(p.id);

html+=`
<div class="card">
<img src="${p.images[0]}" width="100%">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

${q>0?`
<div class="qty">
<button class="minus" onclick="change(${p.id},-1)">-</button>
<span>${q}</span>
<button class="plus" onclick="change(${p.id},1)">+</button>
</div>
`:
`<button class="add-btn" onclick="change(${p.id},1)">Add to Cart</button>`}

</div>`;
});

html+=`</div></div>`;
app.innerHTML=html;
}

/* CART */
function cartPage(){
let html=`<div class="container"><h2>Cart</h2>`;

if(cart.length===0){
html+="Empty cart";
}else{
let total=0;

cart.forEach(c=>{
let p=PRODUCTS.find(x=>x.id===c.id);
total+=p.price*c.qty;

html+=`
<div>
<h3>${p.name}</h3>

<div class="qty">
<button class="minus" onclick="change(${p.id},-1)">-</button>
<span>${c.qty}</span>
<button class="plus" onclick="change(${p.id},1)">+</button>
</div>
</div>`;
});

html+=`<h3>Total ₹${total}</h3>`;
}

html+="</div>";
app.innerHTML=html;
}

/* ROUTER */
function router(){
if(location.hash=="#cart") cartPage();
else home();
}

/* BACK FIX */
window.addEventListener("popstate",()=>{
if(location.hash==""||location.hash=="#home"){
window.close();
}else{
history.back();
}
});

function render(){
updateCount();
router();
}

window.addEventListener("hashchange",render);
render();
</script>

</body>
</html>
