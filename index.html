<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blink Market</title>

<style>
:root{
--gold:#b8962e;
--blue:#1e88e5;
--red:#e53935;
--bg:#f5f5f5;
}

body{margin:0;font-family:Arial;background:var(--bg);}

/* HEADER */
header{
background:var(--blue);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* TOGGLE */
.toggle{display:flex;padding:10px;gap:10px;}
.toggle button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:#ddd;
cursor:pointer;
}
.active{background:var(--gold);color:white;}

/* SEARCH */
.search{padding:10px;}
.search input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

/* GRID */
.container{padding:10px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

/* CARD */
.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

/* BUTTON */
.btn{
padding:7px;
border:none;
border-radius:6px;
cursor:pointer;
}
.add{background:var(--red);color:white;width:100%;}
.plus{background:var(--blue);color:white;}
.minus{background:var(--gold);}

/* QTY */
.qty{display:flex;justify-content:center;gap:6px;margin-top:6px;}

/* CART */
.cart-item{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

/* CHECKOUT */
.checkout{
max-width:420px;
margin:40px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}
.checkout button{
width:100%;
padding:12px;
background:var(--blue);
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

/* CART BAR */
.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:var(--blue);
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

function save(){localStorage.setItem("neo_cart",JSON.stringify(cart));update();}
function update(){count.innerText=cart.reduce((a,c)=>a+c.qty,0);}
function qty(id){let i=cart.find(x=>x.id===id);return i?i.qty:0;}
function change(id,val){
let i=cart.find(x=>x.id===id);
if(i){i.qty+=val;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);}
else cart.push({id,qty:1});
save();render();
}

/* ROUTER + UI (same stable system) */
