<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blink Market</title>

<style>
:root {
    --green: #2e7d32;
    --gold: #c8a951;
    --bg: #f8f5f0;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
}

h1, h2, h3 {
    font-family: Georgia, serif;
}

header {
    background: var(--green);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

.cart-count {
    background: var(--gold);
    padding: 3px 7px;
    border-radius: 50%;
}

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    background: var(--green);
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: var(--gold);
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

.hero {
    background: var(--gold);
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h2>Blink Market</h2>
    <nav>
        <a href="#home">Home</a>
        <a href="#cart">Cart (<span id="cartCount">0</span>)</a>
    </nav>
</header>

<div id="app"></div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
    name: "Blink Market",
    tagline: "Fast & Fresh Deals",
    currency: "₹",
    formspree: "YOUR_FORMSPREE_URL"
};

/* ================= PRODUCTS ================= */
const PRODUCTS = [
{
id:1,
name:"Green Tea",
price:199,
category:"Drinks",
description:"Healthy organic green tea",
images:["https://via.placeholder.com/200"],
stock:10
},
{
id:2,
name:"Honey",
price:299,
category:"Food",
description:"Pure natural honey",
images:["https://via.placeholder.com/200"],
stock:15
},
{
id:3,
name:"Almonds",
price:499,
category:"Dry Fruits",
description:"Premium almonds",
images:["https://via.placeholder.com/200"],
stock:8
}
];

/* ================= CART ================= */
let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];

function saveCart(){
    localStorage.setItem("neo_cart", JSON.stringify(cart));
    updateCartCount();
}

function updateCartCount(){
    document.getElementById("cartCount").innerText =
        cart.reduce((a,c)=>a+c.qty,0);
}

function addToCart(id){
    let item = cart.find(i=>i.id===id);
    if(item) item.qty++;
    else cart.push({id, qty:1});
    saveCart();
    render();
}

function removeFromCart(id){
    cart = cart.filter(i=>i.id!==id);
    saveCart();
    render();
}

/* ================= ROUTER ================= */
function router(){
    let hash = location.hash || "#home";

    if(hash.startsWith("#product")){
        let id = hash.split("=")[1];
        productPage(id);
    }
    else if(hash === "#cart") cartPage();
    else if(hash === "#checkout") checkoutPage();
    else homePage();
}

/* ================= HOME ================= */
function homePage(){
    let html = `
    <div class="hero">
        <h1>${CONFIG.name}</h1>
        <p>${CONFIG.tagline}</p>
    </div>

    <div class="container">
    <div class="grid">
    `;

    PRODUCTS.forEach(p=>{
        let inCart = cart.find(i=>i.id===p.id);

        html += `
        <div class="card" onclick="location.hash='#product=${p.id}'">
            <img src="${p.images[0]}" width="100%">
            <h3>${p.name}</h3>
            <p>${CONFIG.currency}${p.price}</p>

            <button onclick="event.stopPropagation(); addToCart(${p.id})">
                ${inCart ? "In Cart ✓" : "Add to Cart"}
            </button>
        </div>`;
    });

    html += "</div></div>";
    app.innerHTML = html;
}

/* ================= PRODUCT PAGE ================= */
function productPage(id){
    let p = PRODUCTS.find(x=>x.id==id);

    let html = `
    <div class="container">
        <h2>${p.name}</h2>
        <img src="${p.images[0]}" width="200">
        <p>${p.description}</p>
        <h3>${CONFIG.currency}${p.price}</h3>

        <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
    `;

    app.innerHTML = html;
}

/* ================= CART PAGE ================= */
function cartPage(){
    let html = `<div class="container"><h2>Cart</h2>`;

    if(cart.length===0){
        html += "<p>Cart is empty</p>";
    } else {
        let total = 0;

        cart.forEach(c=>{
            let p = PRODUCTS.find(x=>x.id===c.id);
            total += p.price * c.qty;

            html += `
            <div>
                <h3>${p.name}</h3>
                <p>${CONFIG.currency}${p.price} x ${c.qty}</p>

                <button onclick="c.qty++; saveCart(); render()">+</button>
                <button onclick="c.qty--; if(c.qty<=0) removeFromCart(${p.id}); saveCart(); render()">-</button>
                <button onclick="removeFromCart(${p.id})">Remove</button>
            </div>`;
        });

        html += `<h3>Total: ${CONFIG.currency}${total}</h3>
        <button onclick="location.hash='#checkout'">Checkout</button>`;
    }

    html += "</div>";
    app.innerHTML = html;
}

/* ================= CHECKOUT ================= */
function checkoutPage(){
    let total = cart.reduce((sum,c)=>{
        let p = PRODUCTS.find(x=>x.id===c.id);
        return sum + p.price*c.qty;
    },0);

    let html = `
    <div class="container">
        <h2>Checkout</h2>

        <form id="checkoutForm">
            <input placeholder="Name" required>
            <input placeholder="Email" required>
            <input placeholder="Phone" required>
            <textarea placeholder="Address" required></textarea>
            <textarea placeholder="Notes"></textarea>

            <h3>Total: ${CONFIG.currency}${total}</h3>

            <button type="submit">Place Order</button>
        </form>

        <div id="success" style="display:none;">
            <h3>Order placed successfully!</h3>
        </div>
    </div>
    `;

    app.innerHTML = html;

    document.getElementById("checkoutForm").onsubmit = function(e){
        e.preventDefault();

        fetch(CONFIG.formspree,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({cart})
        });

        document.getElementById("success").style.display="block";

        cart = [];
        saveCart();

        setTimeout(()=>location.hash="#home",3000);
    };
}

/* ================= BACK BUTTON LOGIC ================= */
window.addEventListener("popstate", function () {
    if (location.hash === "" || location.hash === "#home") {
        // Exit site behavior (Android back)
        if (confirm("Exit Blink Market?")) {
            window.close();
        }
    } else {
        router();
    }
});

/* ================= INIT ================= */
function render(){
    updateCartCount();
    router();
}

window.addEventListener("hashchange", render);
render();

</script>

</body>
</html>
