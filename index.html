
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blink Market</title>

<style>
:root{
--red:#e53935;
--blue:#1e88e5;
--gold:#d4af37;
--bg:#f5f7fa;
}

body{margin:0;font-family:Arial;background:var(--bg);}

/* HEADER */
header{
background:var(--blue);
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

/* TOGGLE */
.toggle{
display:flex;
gap:10px;
padding:10px;
}
.toggle button{
flex:1;
padding:8px;
border:none;
border-radius:6px;
}
.active{background:var(--gold);}

/* SEARCH */
.search{
padding:10px;
}
.search input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* HERO */
.hero{
text-align:center;
padding:10px;
font-size:14px;
background:var(--gold);
}

/* GRID */
.container{padding:10px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

/* CARD */
.card{
background:white;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* BUTTON */
.btn{padding:6px;border:none;border-radius:5px;}
.add{background:var(--red);color:white;width:100%;}
.plus{background:var(--blue);color:white;}
.minus{background:var(--gold);}

/* QTY */
.qty{
display:flex;
justify-content:center;
gap:6px;
margin-top:5px;
}

/* CART BAR */
.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:var(--blue);
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

/* CHECKOUT */
.checkout{
max-width:400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h3>Blink Market</h3>
<div onclick="location.hash='#cart'">Cart (<span id="count">0</span>)</div>
</header>

<div class="toggle">
<button id="gBtn" class="active">Grocery</button>
<button id="fBtn">Food</button>
</div>

<div class="search">
<input id="search" placeholder="Search groceries...">
</div>

<div class="hero">Fast Delivery ⚡</div>

<div id="app"></div>
<div id="cartBar"></div>

<script>

/* DATA */
let mode="grocery";

const grocery=[ ...Array(12).keys() ].map(i=>({
id:i+1,
name:"Grocery "+(i+1),
price:50+i*10,
img:"https://source.unsplash.com/200x200/?grocery,food,"+i,
desc:"Fresh grocery item"
}));

const food=[ ...Array(12).keys() ].map(i=>({
id:100+i,
name:"Food "+(i+1),
price:100+i*20,
img:"https://source.unsplash.com/200x200/?meal,food,"+i,
desc:"Delicious cooked food"
}));

let cart=JSON.parse(localStorage.getItem("neo_cart"))||[];

/* FUNCTIONS */
function save(){
localStorage.setItem("neo_cart",JSON.stringify(cart));
updateCount();
}

function updateCount(){
count.innerText=cart.reduce((a,c)=>a+c.qty,0);
}

function qty(id){
let i=cart.find(x=>x.id===id);
return i?i.qty:0;
}

function change(id,val){
let i=cart.find(x=>x.id===id);
if(i){
i.qty+=val;
if(i.qty<=0) cart=cart.filter(x=>x.id!==id);
}else{
cart.push({id,qty:1});
}
save(); render();
}

/* HOME */
function home(){
let list=(mode=="grocery"?grocery:food)
.filter(p=>p.name.toLowerCase().includes(search.value.toLowerCase()));

let html=`<div class="container"><div class="grid">`;

list.forEach(p=>{
let q=qty(p.id);

html+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}" width="100%">
<h4>${p.name}</h4>
<p>₹${p.price}</p>

${q>0?`
<div class="qty" onclick="event.stopPropagation()">
<button class="btn minus" onclick="change(${p.id},-1)">-</button>
<span>${q}</span>
<button class="btn plus" onclick="change(${p.id},1)">+</button>
</div>`:
`<button class="btn add" onclick="event.stopPropagation();change(${p.id},1)">Add</button>`}

</div>`;
});

html+=`</div></div>`;
app.innerHTML=html;
}

/* PRODUCT */
function openProduct(id){ location.hash="#product="+id; }

function productPage(id){
let all=[...grocery,...food];
let p=all.find(x=>x.id==id);
let q=qty(p.id);

app.innerHTML=`
<div class="container">
<h2>${p.name}</h2>
<img src="${p.img}" width="100%">
<p>${p.desc}</p>
<h3>₹${p.price}</h3>

${q>0?`
<div class="qty">
<button class="btn minus" onclick="change(${p.id},-1)">-</button>
<span>${q}</span>
<button class="btn plus" onclick="change(${p.id},1)">+</button>
</div>`:
`<button class="btn add" onclick="change(${p.id},1)">Add to Cart</button>`}
</div>`;
}

/* CART */
function cartPage(){
let total=0;
let html=`<div class="container"><h2>Cart</h2>`;

cart.forEach(c=>{
let p=[...grocery,...food].find(x=>x.id===c.id);
total+=p.price*c.qty;

html+=`
<div class="card">
<h4>${p.name}</h4>
<p>₹${p.price*c.qty}</p>
<div class="qty">
<button class="btn minus" onclick="change(${p.id},-1)">-</button>
<span>${c.qty}</span>
<button class="btn plus" onclick="change(${p.id},1)">+</button>
</div>
</div>`;
});

html+=`<h3>Total ₹${total}</h3>
<button onclick="location.hash='#checkout'">Checkout</button></div>`;
app.innerHTML=html;
}

/* CHECKOUT */
function checkoutPage(){
let total=cart.reduce((s,c)=>{
let p=[...grocery,...food].find(x=>x.id===c.id);
return s+p.price*c.qty;
},0);

app.innerHTML=`
<div class="checkout">
<h2>Checkout</h2>
<input placeholder="Name">
<input placeholder="Phone">
<textarea placeholder="Address"></textarea>
<h3>Total ₹${total}</h3>
<button>Place Order</button>
</div>`;
}

/* CART BAR */
function cartBar(){
if(location.hash=="#cart"){ cartBar.innerHTML=""; return; }

let total=cart.reduce((s,c)=>{
let p=[...grocery,...food].find(x=>x.id===c.id);
return s+p.price*c.qty;
},0);

if(total>0){
cartBar.innerHTML=`
<div class="cart-bar">
<span>₹${total}</span>
<button onclick="location.hash='#cart'">Go to Cart</button>
</div>`;
}else cartBar.innerHTML="";
}

/* ROUTER */
function router(){
let h=location.hash||"#home";

if(h.startsWith("#product")) productPage(h.split("=")[1]);
else if(h=="#cart") cartPage();
else if(h=="#checkout") checkoutPage();
else home();

cartBar();
}

/* EVENTS */
gBtn.onclick=()=>{mode="grocery";search.placeholder="Search groceries...";render();}
fBtn.onclick=()=>{mode="food";search.placeholder="Search food...";render();}
search.oninput=render;

function render(){
updateCount();
router();
}

window.addEventListener("hashchange",render);
render();

</script>

</body>
</html>
