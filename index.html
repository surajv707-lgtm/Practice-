<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blink Market - Online Store</title>

<meta name="description" content="Blink Market - Buy quality products at best price">

<style>
:root {
    --red:#e53935;
    --blue:#1e88e5;
    --gold:#d4af37;
    --bg:#f5f7fa;
}

body { margin:0; font-family:Arial; background:var(--bg); }

header {
    background:var(--blue);
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

nav a { color:white; margin:0 10px; text-decoration:none; }

.container { padding:15px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.card {
    background:white;
    padding:12px;
    border-radius:10px;
}

.qty {
    display:flex;
    gap:8px;
    align-items:center;
}

.qty button {
    width:30px;
    height:30px;
}

.add {
    width:100%;
    background:var(--red);
    color:white;
    padding:8px;
}

.hero {
    background:var(--gold);
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
<h2>Blink Market</h2>
<nav>
<a href="#home">Home</a>
<a href="#cart">Cart (<span id="count">0</span>)</a>
</nav>
</header>

<main id="app"></main>

<script>
const PRODUCTS = [
{ id:1,name:"Green Tea",price:199,image:"https://via.placeholder.com/200"},
{ id:2,name:"Honey",price:299,image:"https://via.placeholder.com/200"},
{ id:3,name:"Almonds",price:499,image:"https://via.placeholder.com/200"}
];

let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];

function save(){
    localStorage.setItem("neo_cart",JSON.stringify(cart));
    updateCount();
}

function updateCount(){
    count.innerText = cart.reduce((a,c)=>a+c.qty,0);
}

function getQty(id){
    let i=cart.find(x=>x.id===id);
    return i?i.qty:0;
}

function changeQty(id,val){
    let item=cart.find(x=>x.id===id);

    if(item){
        item.qty+=val;
        if(item.qty<=0) cart=cart.filter(x=>x.id!==id);
    } else {
        cart.push({id,qty:1});
    }

    save();
    render();
}

/* HOME */
function home(){
let html=`
<section class="hero">
<h1>Blink Market</h1>
<p>Best Deals Everyday</p>
</section>

<section class="container">
<div class="grid">`;

PRODUCTS.forEach(p=>{
let q=getQty(p.id);

html+=`
<article class="card">
<img src="${p.image}" width="100%">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

${q>0?`
<div class="qty">
<button onclick="changeQty(${p.id},-1)">-</button>
<span>${q}</span>
<button onclick="changeQty(${p.id},1)">+</button>
</div>
`:
`<button class="add" onclick="changeQty(${p.id},1)">Add to Cart</button>`}

</article>`;
});

html+=`</div></section>`;
app.innerHTML=html;
}

/* CART PAGE */
function cartPage(){
let total=0;

let html=`
<section class="container">
<h1>Your Cart</h1>
`;

if(cart.length===0){
html+="<p>Your cart is empty</p>";
}else{

cart.forEach(c=>{
let p=PRODUCTS.find(x=>x.id===c.id);
total+=p.price*c.qty;

html+=`
<article>
<h3>${p.name}</h3>

<div class="qty">
<button onclick="changeQty(${p.id},-1)">-</button>
<span>${c.qty}</span>
<button onclick="changeQty(${p.id},1)">+</button>
</div>

<p>₹${p.price*c.qty}</p>
<button onclick="removeItem(${p.id})">Remove</button>
</article>
<hr>`;
});

html+=`
<h2>Total: ₹${total}</h2>
<a href="#checkout"><button>Checkout</button></a>
`;
}

html+="</section>";
app.innerHTML=html;
}

function removeItem(id){
cart=cart.filter(x=>x.id!==id);
save();
render();
}

/* CHECKOUT */
function checkout(){
let total=cart.reduce((s,c)=>{
let p=PRODUCTS.find(x=>x.id===c.id);
return s+p.price*c.qty;
},0);

app.innerHTML=`
<section class="container">
<h1>Checkout</h1>

<form id="orderForm">

<label>Name</label>
<input required>

<label>Email</label>
<input type="email" required>

<label>Phone</label>
<input required>

<label>Address</label>
<textarea required></textarea>

<label>Notes</label>
<textarea></textarea>

<h2>Total ₹${total}</h2>

<button type="submit">Place Order</button>
</form>

</section>
`;

document.getElementById("orderForm").onsubmit=function(e){
e.preventDefault();

alert("Order placed!");

cart=[];
save();

location.hash="#home";
};
}

/* ROUTER */
function router(){
let hash=location.hash || "#home";

if(hash=="#cart") cartPage();
else if(hash=="#checkout") checkout();
else home();
}

/* FIXED BACK BEHAVIOR */
window.addEventListener("popstate",()=>{
// Do nothing — let browser handle naturally
});

/* INIT */
function render(){
updateCount();
router();
}

window.addEventListener("hashchange",render);
render();
</script>

</body>
</html>
