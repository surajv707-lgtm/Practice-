<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blink Market</title>

<style>
:root {
    --red: #c62828;
    --blue: #1565c0;
    --gold: #d4af37;
    --bg: #f5f5f5;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
}

h1,h2,h3 {
    font-family: Georgia, serif;
}

header {
    background: var(--blue);
    color: white;
    padding: 15px;
    display:flex;
    justify-content:space-between;
}

nav a {
    color:white;
    margin:0 10px;
    text-decoration:none;
}

.cart-count {
    background: var(--gold);
    padding: 3px 7px;
    border-radius:50%;
}

.container { padding:20px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    transition:0.3s;
    cursor:pointer;
}

.card:hover { transform:scale(1.05); }

button {
    border:none;
    padding:6px 10px;
    cursor:pointer;
    border-radius:5px;
}

.btn-add { background:var(--red); color:white; }
.btn-plus { background:var(--blue); color:white; }
.btn-minus { background:var(--gold); }

.hero {
    background: var(--gold);
    padding:20px;
    text-align:center;
}
.qty-box {
    display:flex;
    align-items:center;
    gap:5px;
}
</style>
</head>

<body>

<header>
    <h2>Blink Market</h2>
    <nav>
        <a href="#home">Home</a>
        <a href="#cart">Cart (<span id="cartCount">0</span>)</a>
    </nav>
</header>

<div id="app"></div>

<script>
/* CONFIG */
const CONFIG = {
    currency: "₹",
    formspree: "YOUR_FORMSPREE_URL"
};

/* PRODUCTS */
const PRODUCTS = [
{ id:1,name:"Green Tea",price:199,category:"Drinks",description:"Healthy tea",images:["https://via.placeholder.com/200"],stock:10},
{ id:2,name:"Honey",price:299,category:"Food",description:"Pure honey",images:["https://via.placeholder.com/200"],stock:15},
{ id:3,name:"Almonds",price:499,category:"Dry Fruits",description:"Premium almonds",images:["https://via.placeholder.com/200"],stock:8}
];

/* CART */
let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];

function saveCart(){
    localStorage.setItem("neo_cart", JSON.stringify(cart));
    updateCartCount();
}

function updateCartCount(){
    document.getElementById("cartCount").innerText =
        cart.reduce((a,c)=>a+c.qty,0);
}

function getQty(id){
    let item = cart.find(i=>i.id===id);
    return item ? item.qty : 0;
}

function changeQty(id,delta){
    let item = cart.find(i=>i.id===id);

    if(item){
        item.qty += delta;
        if(item.qty <= 0) cart = cart.filter(i=>i.id!==id);
    } else if(delta > 0){
        cart.push({id,qty:1});
    }

    saveCart();
    render();
}

/* ROUTER */
function router(){
    let hash = location.hash || "#home";

    if(hash.startsWith("#product")){
        productPage(hash.split("=")[1]);
    }
    else if(hash=="#cart") cartPage();
    else if(hash=="#checkout") checkoutPage();
    else homePage();
}

/* HOME */
function homePage(){
    let html = `
    <div class="hero">
        <h1>Blink Market</h1>
        <p>Fast & Fresh Deals</p>
    </div>

    <div class="container">
    <div class="grid">`;

    PRODUCTS.forEach(p=>{
        let qty = getQty(p.id);

        html += `
        <div class="card" onclick="location.hash='#product=${p.id}'">
            <img src="${p.images[0]}" width="100%">
            <h3>${p.name}</h3>
            <p>${CONFIG.currency}${p.price}</p>

            ${qty > 0 ? `
            <div class="qty-box" onclick="event.stopPropagation()">
                <button class="btn-minus" onclick="changeQty(${p.id},-1)">-</button>
                <span>${qty}</span>
                <button class="btn-plus" onclick="changeQty(${p.id},1)">+</button>
            </div>
            ` : `
            <button class="btn-add" onclick="event.stopPropagation(); changeQty(${p.id},1)">
                Add to Cart
            </button>
            `}
        </div>`;
    });

    html += "</div></div>";
    app.innerHTML = html;
}

/* PRODUCT PAGE */
function productPage(id){
    let p = PRODUCTS.find(x=>x.id==id);
    let qty = getQty(p.id);

    app.innerHTML = `
    <div class="container">
        <h2>${p.name}</h2>
        <img src="${p.images[0]}" width="200">
        <p>${p.description}</p>
        <h3>${CONFIG.currency}${p.price}</h3>

        ${qty>0 ? `
        <div class="qty-box">
            <button class="btn-minus" onclick="changeQty(${p.id},-1)">-</button>
            <span>${qty}</span>
            <button class="btn-plus" onclick="changeQty(${p.id},1)">+</button>
        </div>` :
        `<button class="btn-add" onclick="changeQty(${p.id},1)">Add to Cart</button>`
        }
    </div>`;
}

/* CART PAGE */
function cartPage(){
    let html = `<div class="container"><h2>Cart</h2>`;

    if(cart.length==0){
        html += "<p>Empty cart</p>";
    } else {
        let total=0;

        cart.forEach(c=>{
            let p = PRODUCTS.find(x=>x.id===c.id);
            total += p.price*c.qty;

            html += `
            <div>
                <h3>${p.name}</h3>
                <div class="qty-box">
                    <button class="btn-minus" onclick="changeQty(${p.id},-1)">-</button>
                    <span>${c.qty}</span>
                    <button class="btn-plus" onclick="changeQty(${p.id},1)">+</button>
                </div>
            </div>`;
        });

        html += `<h3>Total: ${CONFIG.currency}${total}</h3>
        <button onclick="location.hash='#checkout'">Checkout</button>`;
    }

    html += "</div>";
    app.innerHTML = html;
}

/* CHECKOUT */
function checkoutPage(){
    let total = cart.reduce((s,c)=>{
        let p = PRODUCTS.find(x=>x.id===c.id);
        return s + p.price*c.qty;
    },0);

    app.innerHTML = `
    <div class="container">
        <h2>Checkout</h2>

        <form id="form">
            <input required placeholder="Name">
            <input required placeholder="Email">
            <input required placeholder="Phone">
            <textarea required placeholder="Address"></textarea>
            <textarea placeholder="Notes"></textarea>

            <h3>Total: ${CONFIG.currency}${total}</h3>
            <button type="submit">Place Order</button>
        </form>

        <div id="success" style="display:none;">
            <h3>Order successful!</h3>
        </div>
    </div>`;

    document.getElementById("form").onsubmit = function(e){
        e.preventDefault();

        fetch(CONFIG.formspree,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({cart})
        });

        cart=[];
        saveCart();

        document.getElementById("success").style.display="block";

        setTimeout(()=>location.hash="#home",3000);
    };
}

/* BACK BUTTON FIX */
history.pushState(null,null,location.href);

window.onpopstate = function(){
    if(location.hash==="" || location.hash=="#home"){
        // exit silently (no popup)
        window.location.href = "about:blank";
    } else {
        history.back();
    }
};

/* INIT */
function render(){
    updateCartCount();
    router();
}

window.addEventListener("hashchange", render);
render();
</script>

</body>
</html>
